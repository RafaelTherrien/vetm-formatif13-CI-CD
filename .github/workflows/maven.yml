name: Java CI with Maven
'on':
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: maven
      - name: Installer Maven 3.9.6
        run: |
          curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz
          echo "$PWD/apache-maven-3.9.6/bin" >> $GITHUB_PATH
      - name: Compiler le projet
        run: mvn -B compile --file pom.xml
      - name: Exécuter les tests
        run: mvn -B test --file pom.xml
      - name: Lint
        run: mvn -B formatter:validate
      - name: Coverage
        run: mvn -B verify --file pom.xml
